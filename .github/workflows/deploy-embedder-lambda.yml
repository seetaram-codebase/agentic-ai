name: Deploy Embedder Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambda/embedder/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_NAME: rag-demo

jobs:
  deploy-embedder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Print requirements file before install
        run: |
          echo "=== EMBEDDER requirements-minimal.txt CONTENT ==="
          cat lambda/embedder/requirements-minimal.txt
          echo ""
          echo "=== Verifying required packages are present ==="
          if grep -q "langchain" lambda/embedder/requirements-minimal.txt; then
            echo "✅ langchain found in requirements"
          else
            echo "❌ langchain NOT found in requirements"
            exit 1
          fi

      - name: Install dependencies and package Embedder
        run: |
          cd lambda/embedder
          mkdir -p package
          
          echo "Installing dependencies..."
          # Exclude boto3/botocore (already in Lambda runtime)
          grep -v "boto3" requirements-minimal.txt > requirements-lambda.txt || true
          
          pip install -r requirements-lambda.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade \
            --no-cache-dir
          
          echo "Cleaning up to reduce size..."
          # Remove unnecessary files to reduce package size
          cd package
          find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          find . -type f -name "*.pyo" -delete 2>/dev/null || true
          find . -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          
          # Remove documentation and examples
          rm -rf */tests */examples */docs 2>/dev/null || true
          
          # Remove boto3/botocore (available in Lambda runtime)
          rm -rf boto3* botocore* s3transfer* 2>/dev/null || true
          
          echo "Copying handler..."
          cp ../handler.py .
          
          echo "Creating ZIP..."
          zip -r9 ../embedder.zip . -x "*.pyc" -x "*.pyo"
          cd ..
          
          # Check size and fail if too large
          SIZE=$(stat --format=%s embedder.zip 2>/dev/null || stat -f%z embedder.zip 2>/dev/null || echo 0)
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Package size: $SIZE bytes (~${SIZE_MB} MB)"
          
          if [ $SIZE -gt 50000000 ]; then
            echo "❌ ERROR: Package is too large (${SIZE_MB}MB > 50MB)"
            echo "Top 30 largest files:"
            unzip -l embedder.zip | sort -k4 -rn | head -30
            exit 1
          else
            echo "✅ Package size OK (${SIZE_MB}MB < 50MB)"
          fi

      - name: Deploy Embedder Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-embedder \
            --zip-file fileb://lambda/embedder/embedder.zip \
            --region ${{ env.AWS_REGION }}

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}-embedder \
            --region ${{ env.AWS_REGION }}

      - name: Deployment Summary
        run: |
          echo "## ✅ Embedder Lambda Deployed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Function Name:** ${{ env.APP_NAME }}-embedder" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runtime:** Python 3.11" >> $GITHUB_STEP_SUMMARY

