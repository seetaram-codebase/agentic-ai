name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'electron-ui/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'electron-ui/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd electron-ui
          npm ci

      - name: Run TypeScript check
        run: |
          cd electron-ui
          npx tsc --noEmit
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd electron-ui
          npm ci

      - name: Build
        run: |
          cd electron-ui
          npm run vite build

      - name: Build successful
        run: echo "✅ Frontend build successful"
