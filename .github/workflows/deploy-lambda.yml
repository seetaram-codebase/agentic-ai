name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Lambda function to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - chunker
          - embedder

env:
  AWS_REGION: us-east-1
  APP_NAME: rag-demo

jobs:
  deploy-chunker:
    runs-on: ubuntu-latest
    if: github.event.inputs.function == 'both' || github.event.inputs.function == 'chunker' || github.event.inputs.function == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Print requirements file before install
        run: |
          echo "=== CHUNKER requirements-minimal.txt CONTENT ==="
          cat lambda/chunker/requirements-minimal.txt
          echo ""
          echo "=== Verifying langchain-community is present ==="
          if grep -q "langchain-community" lambda/chunker/requirements-minimal.txt; then
            echo "✅ langchain-community found in requirements"
          else
            echo "❌ langchain-community NOT found in requirements"
            exit 1
          fi

      - name: Install dependencies and package Chunker
        run: |
          cd lambda/chunker
          mkdir -p package
          
          echo "Installing dependencies..."
          pip install -r requirements-minimal.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --upgrade \
            --no-cache-dir
          
          echo "Cleaning up to reduce size..."
          # Remove unnecessary files to reduce package size
          find package -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find package -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find package -type f -name "*.pyc" -delete 2>/dev/null || true
          find package -type f -name "*.pyo" -delete 2>/dev/null || true
          find package -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find package -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          
          # Remove large unnecessary files
          rm -rf package/boto3* package/botocore* package/s3transfer* 2>/dev/null || true
          
          echo "Copying handler..."
          cp handler.py package/
          
          echo "Creating ZIP..."
          cd package
          zip -r9 ../chunker.zip . -x "*.pyc" -x "__pycache__/*" -x "*.dist-info/*" -x "tests/*"
          cd ..
          
          # Check size and fail if too large
          SIZE=$(stat --format=%s chunker.zip 2>/dev/null || stat -f%z chunker.zip 2>/dev/null || echo 0)
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Package size: $SIZE bytes (~${SIZE_MB} MB)"
          
          if [ $SIZE -gt 50000000 ]; then
            echo "❌ ERROR: Package is too large (${SIZE_MB}MB > 50MB)"
            echo "Package contents:"
            unzip -l chunker.zip | head -50
            exit 1
          else
            echo "✅ Package size OK (${SIZE_MB}MB < 50MB)"
          fi

      - name: Deploy Chunker Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-chunker \
            --zip-file fileb://lambda/chunker/chunker.zip \
            --region ${{ env.AWS_REGION }}

      - name: Chunker deployed
        run: echo "✅ Chunker Lambda deployed" >> $GITHUB_STEP_SUMMARY

  deploy-embedder:
    runs-on: ubuntu-latest
    needs: deploy-chunker  # Wait for chunker to finish to avoid ResourceConflictException
    if: github.event.inputs.function == 'both' || github.event.inputs.function == 'embedder' || github.event.inputs.function == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Print requirements file before install
        run: |
          echo "=== EMBEDDER requirements-minimal.txt CONTENT ==="
          cat lambda/embedder/requirements-minimal.txt
          echo ""

      - name: Install dependencies and package Embedder
        run: |
          cd lambda/embedder
          mkdir -p package
          
          echo "Installing dependencies..."
          pip install -r requirements-minimal.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --no-cache-dir
          
          echo "Cleaning up to reduce size..."
          # Remove unnecessary files
          find package -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
          find package -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find package -type f -name "*.pyc" -delete 2>/dev/null || true
          find package -type f -name "*.pyo" -delete 2>/dev/null || true
          find package -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
          find package -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
          
          # Remove boto3/botocore (available in Lambda runtime)
          rm -rf package/boto3* package/botocore* package/s3transfer* 2>/dev/null || true
          
          echo "Copying handler..."
          cp handler.py package/
          
          echo "Creating ZIP..."
          cd package
          zip -r ../embedder.zip . -x "*.pyc" -x "__pycache__/*" -x "*.dist-info/*" -x "tests/*"
          cd ..
          
          # Check size
          SIZE=$(stat -f%z embedder.zip 2>/dev/null || stat -c%s embedder.zip)
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Package size: $SIZE bytes (~${SIZE_MB}MB)"
          
          if [ $SIZE -gt 50000000 ]; then
            echo "❌ WARNING: Package is larger than 50MB (${SIZE_MB}MB)"
            unzip -l embedder.zip | head -50
          else
            echo "✅ Package size OK (${SIZE_MB}MB < 50MB)"
          fi

      - name: Deploy Embedder Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-embedder \
            --zip-file fileb://lambda/embedder/embedder.zip \
            --region ${{ env.AWS_REGION }}

      - name: Embedder deployed
        run: echo "✅ Embedder Lambda deployed" >> $GITHUB_STEP_SUMMARY
