name: Deploy Lambda Functions

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Lambda function to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - chunker
          - embedder

env:
  AWS_REGION: us-east-1
  APP_NAME: rag-demo

jobs:
  deploy-chunker:
    runs-on: ubuntu-latest
    if: github.event.inputs.function == 'both' || github.event.inputs.function == 'chunker' || github.event.inputs.function == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and package Embedder
        run: |
          cd lambda/embedder
          mkdir -p package
          
          # Use minimal requirements (no ChromaDB)
          pip install -r requirements-minimal.txt -t package/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --upgrade
          
          cp handler.py package/
          cd package
          zip -r9 ../embedder.zip . -x "*.pyc" -x "__pycache__/*" -x "*.dist-info/*"
          cd ..
          
          # Check size
          SIZE=$(stat --format=%s embedder.zip 2>/dev/null || stat -f%z embedder.zip 2>/dev/null || echo 0)
          echo "Package size: $SIZE bytes (~$(($SIZE / 1024 / 1024)) MB)"

      - name: Deploy Embedder Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-embedder \
            --zip-file fileb://lambda/embedder/embedder.zip \
            --region ${{ env.AWS_REGION }}

      - name: Chunker deployed
        run: echo "✅ Chunker Lambda deployed" >> $GITHUB_STEP_SUMMARY

  deploy-embedder:
    runs-on: ubuntu-latest
    if: github.event.inputs.function == 'both' || github.event.inputs.function == 'embedder' || github.event.inputs.function == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies and package Embedder
        run: |
          cd lambda/embedder
          mkdir -p package
          
          # Use minimal requirements (no ChromaDB - use API instead)
          pip install -r requirements-minimal.txt -t package/ --platform manylinux2014_x86_64 --only-binary=:all:
          
          # Copy handler
          cp handler.py package/
          
          # Create ZIP
          cd package
          zip -r ../embedder.zip . -x "*.pyc" -x "__pycache__/*" -x "*.dist-info/*"
          cd ..
          
          # Check size
          SIZE=$(stat -f%z embedder.zip 2>/dev/null || stat -c%s embedder.zip)
          echo "Package size: $SIZE bytes"
          if [ $SIZE -gt 50000000 ]; then
            echo "Warning: Package is larger than 50MB"
          fi

      - name: Deploy Embedder Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }}-embedder \
            --zip-file fileb://lambda/embedder/embedder.zip \
            --region ${{ env.AWS_REGION }}

      - name: Embedder deployed
        run: echo "✅ Embedder Lambda deployed" >> $GITHUB_STEP_SUMMARY
