[pytest]
# Pytest configuration for RAG Demo API

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use local services)
    aws: AWS integration tests (requires AWS credentials)
    e2e: End-to-end tests (requires full deployment)
    slow: Slow running tests

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts =
#     --cov=app
#     --cov-report=html
#     --cov-report=term-missing

# Environment variables for testing
env =
    USE_SSM_CONFIG=false
    USE_DYNAMODB_CONFIG=false
    ENVIRONMENT=test

